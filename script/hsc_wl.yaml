# HSC Weak Lensing Configuration
# YAML format provides better readability and structure for complex configurations

misc:
  njobs: 4
  savepath: /Users/xinq/dev/repos/hsc_wl/output/dsigma/s16a/
  tomography: false # gg lensing
  comoving: true # h^-1
  lens_source_cut: 0.1 # zsource > zlens + lens_source_cut, very soft
  verbose: false
  njackknife: 100

lens_galaxies:
  surveys: merian
  z_bins: [0.10, 0.60]
  rpmin: 0.05
  rpmax: 10.0
  n_rpbins: 10
  linlog: log

  # Column names in lens catalog
  z_col: z
  ra_col: ra
  dec_col: dec

  # File paths (can use glob patterns)
  lens_files:
    - /Users/xinq/dev/repos/hsc_wl/output/prepare_random_s16a/s16a_bin1.fits
    - /Users/xinq/dev/repos/hsc_wl/output/prepare_random_s16a/s16a_bin2.fits
    - /Users/xinq/dev/repos/hsc_wl/output/prepare_random_s16a/s16a_bin3.fits
    - /Users/xinq/dev/repos/hsc_wl/output/prepare_random_s16a/s16a_bin4.fits

  random_files:
    - /Users/xinq/dev/repos/hsc_wl/output/prepare_random_s16a/random_bin1.fits
    - /Users/xinq/dev/repos/hsc_wl/output/prepare_random_s16a/random_bin2.fits
    - /Users/xinq/dev/repos/hsc_wl/output/prepare_random_s16a/random_bin3.fits
    - /Users/xinq/dev/repos/hsc_wl/output/prepare_random_s16a/random_bin4.fits

source_galaxies:
  surveys: hsc
  source_file: /Users/xinq/dev/repos/hsc_wl/data/hscy3_cat.fits
  nz_file: /Users/xinq/dev/repos/hsc_wl/data/nz.fits

# Survey-specific corrections configuration
# These apply to the source survey specified in source_galaxies.surveys
corrections:
  sdss:
    photo_z_dilution_correction: true
    boost_correction: false
    scalar_shear_response_correction: true
    matrix_shear_response_correction: false
    shear_responsivity_correction: true
    hsc_selection_bias_correction: false
    random_subtraction: true

  des:
    photo_z_dilution_correction: false
    boost_correction: false
    scalar_shear_response_correction: true
    matrix_shear_response_correction: true
    shear_responsivity_correction: false
    hsc_selection_bias_correction: false
    random_subtraction: true

  kids:
    photo_z_dilution_correction: false
    boost_correction: false
    scalar_shear_response_correction: true
    matrix_shear_response_correction: false
    shear_responsivity_correction: false
    hsc_selection_bias_correction: false
    random_subtraction: true

  hsc:
    scalar_shear_response_correction: true
    shear_responsivity_correction: true
    selection_bias_correction: true
    random_subtraction: true
    boost_correction: false
