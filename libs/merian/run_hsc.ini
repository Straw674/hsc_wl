[misc]
njobs=40
catalogue_path=/Users/yifei/Dropbox/merian/lensing/
savepath=/pscratch/sd/z/zchusre/m_lensing/output/lensing/
fpath_merian = /Users/yifei/Dropbox/merian/lensing/

tomography=False # gg lensing
comoving=True # h^-1
lens_source_cut=0.1 # zsource > zlens + lens_source_cut, very soft
verbose=False
njackknife=100


[lens galaxies]
surveys=merian
z_bins=0.0,0.5
rpmin=0.05
rpmax=10.
n_rpbins=10
linlog=log

z_col=z500
ra_col=coord_ra_Merian
dec_col=coord_dec_Merian

lens_files=/pscratch/sd/z/zchusre/m_lensing/data/merian/sample1.fits,/pscratch/sd/z/zchusre/m_lensing/data/merian/sample2.fits,/pscratch/sd/z/zchusre/m_lensing/data/merian/sample3.fits,/pscratch/sd/z/zchusre/m_lensing/data/merian/sample4.fits
random_files=/pscratch/sd/z/zchusre/m_lensing/data/merian/sample1_randoms.fits,/pscratch/sd/z/zchusre/m_lensing/data/merian/sample2_randoms.fits,/pscratch/sd/z/zchusre/m_lensing/data/merian/sample3_randoms.fits,/pscratch/sd/z/zchusre/m_lensing/data/merian/sample4_randoms.fits

[source galaxies]
surveys=hsc
source_file=/pscratch/sd/z/zchusre/m_lensing/data/hsc/hsc_y3.fits
nz_file=/pscratch/sd/z/zchusre/m_lensing/data/hsc/nz.fits

[sdss]
photo_z_dilution_correction=True
boost_correction=False
scalar_shear_response_correction=True
matrix_shear_response_correction=False
shear_responsivity_correction=True
hsc_selection_bias_correction=False
random_subtraction=True

[des]
photo_z_dilution_correction=False
boost_correction=False
scalar_shear_response_correction=True
matrix_shear_response_correction=True
shear_responsivity_correction=False
hsc_selection_bias_correction=False
random_subtraction=True

[kids]
photo_z_dilution_correction=False
boost_correction=False
scalar_shear_response_correction=True
matrix_shear_response_correction=False
shear_responsivity_correction=False
hsc_selection_bias_correction=False
random_subtraction=True

[hsc]
scalar_shear_response_correction=True
shear_responsivity_correction=True
selection_bias_correction=True
random_subtraction=True
boost_correction=False